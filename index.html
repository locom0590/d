<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Kognitif VR Uçuş Egzersizi</title>
    <style>
        /* Tam Ekran ve VR Düzeni Ayarları */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #a0c4ff; /* Açık mavi temiz gökyüzü arka planı */
            font-family: sans-serif;
            user-select: none;
        }

        /* Giriş ve Kalibrasyon Ekranı */
        #start-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(160, 196, 255, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: #1d2d44;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .btn {
            padding: 15px 40px;
            font-size: 20px;
            background: #3a86ff;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* VR Box Bölünmüş Ekran Göstergeleri (Sol ve Sağ Göz için Arayüz) */
        .ui-container {
            position: absolute;
            top: 5%;
            width: 50%;
            height: 15%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #1d2d44;
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
            z-index: 10;
            text-shadow: 1px 1px 3px rgba(255,255,255,0.8);
        }

        #ui-left { left: 0; }
        #ui-right { right: 0; }

        /* Ortadaki VR Bölme Çizgisi (Göz hizalamasını kolaylaştırmak için çok silik) */
        #vr-divider {
            position: absolute;
            left: 50%;
            top: 0;
            width: 1px;
            height: 100%;
            background: rgba(255, 255, 255, 0.15);
            z-index: 5;
        }

        #canvas3d {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="start-screen">
        <h2>Kognitif Odaklanma Egzersizi</h2>
        <p style="max-width: 400px; margin-bottom: 30px; line-height: 1.5;">
            Lütfen telefonu yatay konuma getirin. Başlamadan önce ekrana dokunup tam ekrana geçiş yapın ve ardından cihazı VR Box gözlüğünüze yerleştirin.
        </p>
        <button class="btn" id="start-btn">Egzersizi Başlat</button>
    </div>

    <div id="ui-left" class="ui-container">
        <div class="score">Skor: 0</div>
        <div class="timer" style="font-size: 16px; margin-top: 5px;">Süre: 120</div>
    </div>
    <div id="ui-right" class="ui-container">
        <div class="score">Skor: 0</div>
        <div class="timer" style="font-size: 16px; margin-top: 5px;">Süre: 120</div>
    </div>

    <div id="vr-divider"></div>
    <canvas id="canvas3d"></canvas>

    <script>
        // --- OYUN AYARLARI VE DEĞİŞKENLER ---
        const GAME_DURATION = 120; // 2 dakika
        const LOCK_ON_TIME = 5000; // 5 saniye kilitlenme süresi
        const FLIGHT_SPEED = 15;   // Sabit uçuş hızı
        
        let score = 0;
        let timeLeft = GAME_DURATION;
        let gameActive = false;
        let wakeLock = null;

        // Kilitlenme (Lock-on) Takip Sistemleri
        let isTargetInside = false;
        let lockOnStartTime = null;

        // Jiroskop Oryantasyon Verileri
        let devicePitch = 0;
        let deviceRoll = 0;
        let basePitch = null;
        let baseRoll = null;

        // Dokunmatik / Fare ile Kontrol Yedek Planı Değişkenleri
        let touchStartX = 0;
        let touchStartY = 0;
        let touchPitch = 0;
        let touchRoll = 0;
        let isUsingTouch = false;

        // Yumuşatma (Damping) Katsayıları
        let currentRotation = new THREE.Euler(0, 0, 0, 'YXZ');
        const SMOOTHING_FACTOR = 0.04; // Kontrollerin tepki hızını hafifçe artırdık (0.03 -> 0.04)

        // Three.js Çekirdek Elemanları
        let renderer, scene, cameraLeft, cameraRight;
        let playerContainer, targetAircraft, reticleRing, targetAura;
        let hillsContainer;

        const canvas = document.getElementById('canvas3d');

        // --- BAŞLANGIÇ TETİKLEYİCİSİ (GÜNCEL VE DAHA ESNEK VERSİYON) ---
        document.getElementById('start-btn').addEventListener('click', async () => {
            // 1. Tam Ekran Modunu Aktif Etme
            try {
                if (document.documentElement.requestFullscreen) {
                    await document.documentElement.requestFullscreen();
                } else if (document.documentElement.webkitRequestFullscreen) {
                    await document.documentElement.webkitRequestFullscreen();
                }
            } catch (e) { console.log("Tam ekran başlatılamadı."); }

            // 2. Ekranın Kapanmesini Engelleme
            if ('wakeLock' in navigator) {
                try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
            }

            // 3. Sensör İzinleri ve Oyunu Her Koşulda Başlatma Güvencesi
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceOrientationEvent.requestPermission();
                    if (permissionState === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                    } else {
                        console.log('Sensör izni verilmedi, dokunmatik/fare yedek moduna geçiliyor.');
                        setupTouchControls();
                    }
                } catch (error) {
                    console.log("iOS sensör hatası, dokunmatik aktif ediliyor.");
                    setupTouchControls();
                }
            } else {
                // Standart Android veya Masaüstü Tarayıcılar
                window.addEventListener('deviceorientation', handleOrientation);
                // Aynı zamanda dokunmatik yedek planını da arkada hazır tut
                setupTouchControls();
            }

            // Ne olursa olsun oyunu başlat (Donmayı engellemek için)
            startGame();
        });

        // --- GELİŞTİRİLMİŞ JİROSKOP EKSEN YÖNETİMİ ---
        function handleOrientation(event) {
            // Sensör verisi gelmiyorsa dokunmatik kontrolü devreye sokabilmek için kontrol
            if (event.beta === null || event.gamma === null) return;
            
            let rawPitch = 0;
            let rawRoll = 0;

            // Telefonun yatay duruş yönüne göre (Giriş açısı kontrolü) doğru eksenleri eşleme
            if (window.orientation === 90) {
                rawPitch = -event.gamma * (Math.PI / 180);
                rawRoll = event.beta * (Math.PI / 180);
            } else if (window.orientation === -90) {
                rawPitch = event.gamma * (Math.PI / 180);
                rawRoll = -event.beta * (Math.PI / 180);
            } else {
                // Standart dikey veya algılanamayan mod yedek eşlemesi
                rawPitch = event.beta * (Math.PI / 180);
                rawRoll = event.gamma * (Math.PI / 180);
            }

            // İlk açıyı referans (kalibrasyon) olarak kaydet
            if (basePitch === null) {
                basePitch = rawPitch;
                baseRoll = rawRoll;
            }

            // Sapma miktarlarını hesapla
            devicePitch = rawPitch - basePitch;
            deviceRoll = rawRoll - baseRoll;
            
            // Sensör başarıyla çalışıyorsa dokunmatik girdileri ez
            isUsingTouch = false;
        }

        // --- YEDEK PLAN: DOKUNMATİK VE FARE SÜRÜKLEME KONTROLLERİ ---
        function setupTouchControls() {
            // Mobil dokunma olayları
            window.addEventListener('touchstart', (e) => {
                isUsingTouch = true;
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            });

            window.addEventListener('touchmove', (e) => {
                if (!isUsingTouch) return;
                const deltaX = e.touches[0].clientX - touchStartX;
                const deltaY = e.touches[0].clientY - touchStartY;

                // Hassasiyeti kognitif sınırlara göre normalize etme
                touchRoll += (deltaX * 0.005);
                touchPitch += (deltaY * 0.005);

                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            });

            // Masaüstü testleri için fare sürükleme olayları
            let isDragging = false;
            window.addEventListener('mousedown', (e) => {
                isUsingTouch = true;
                isDragging = true;
                touchStartX = e.clientX;
                touchStartY = e.clientY;
            });

            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const deltaX = e.clientX - touchStartX;
                const deltaY = e.clientY - touchStartY;

                touchRoll += (deltaX * 0.003);
                touchPitch += (deltaY * 0.003);

                touchStartX = e.clientX;
                touchStartY = e.clientY;
            });

            window.addEventListener('mouseup', () => { isDragging = false; });
        }

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            gameActive = true;
            initEngine();
            startTimer();
        }

        // --- SÜRE YÖNETİMİ ---
        function startTimer() {
            const timerInterval = setInterval(() => {
                if (!gameActive) {
                    clearInterval(timerInterval);
                    return;
                }
                timeLeft--;
                
                document.querySelectorAll('.timer').forEach(el => el.innerText = `Süre: ${timeLeft}`);

                if (timeLeft <= 0) {
                    gameActive = false;
                    clearInterval(timerInterval);
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            const endDiv = document.createElement('div');
            endDiv.style.position = 'absolute';
            endDiv.style.width = '100%';
            endDiv.style.height = '100%';
            endDiv.style.background = '#1d2d44';
            endDiv.style.color = 'white';
            endDiv.style.display = 'flex';
            endDiv.style.flexDirection = 'column';
            endDiv.style.justifyContent = 'center';
            endDiv.style.alignItems = 'center';
            endDiv.style.zIndex = '200';
            endDiv.style.fontSize = '32px';
            endDiv.innerHTML = `<h2>Egzersiz Tamamlandı</h2><p>Toplam Skor: ${score}</p>`;
            document.body.appendChild(endDiv);

            if (wakeLock) wakeLock.release();
        }

        // --- THREE.JS 3D SİSTEM KURUMLARI ---
        function initEngine() {
            const width = window.innerWidth;
            const height = window.innerHeight;

            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(width, height);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xa0c4ff);
            scene.fog = new THREE.FogExp2(0xa0c4ff, 0.005);

            cameraLeft = new THREE.PerspectiveCamera(60, (width / 2) / height, 0.1, 1000);
            cameraRight = new THREE.PerspectiveCamera(60, (width / 2) / height, 0.1, 1000);
            
            cameraLeft.position.set(-0.3, 0, 0);
            cameraRight.position.set(0.3, 0, 0);

            playerContainer = new THREE.Group();
            playerContainer.add(cameraLeft);
            playerContainer.add(cameraRight);
            scene.add(playerContainer);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
            dirLight.position.set(5, 10, 7);
            scene.add(dirLight);

            createEnvironment();
            createReticle();
            spawnTargetAircraft();

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function createEnvironment() {
            hillsContainer = new THREE.Group();
            const hillGeo = new THREE.ConeGeometry(80, 40, 4);
            const hillMat = new THREE.MeshLambertMaterial({ color: 0xb7e4c7, flatShading: true });

            for(let i = 0; i < 40; i++) {
                const mesh = new THREE.Mesh(hillGeo, hillMat);
                const angle = Math.random() * Math.PI * 2;
                const radius = 300 + Math.random() * 200;
                
                mesh.position.set(Math.cos(angle) * radius, -30, Math.sin(angle) * radius);
                mesh.rotation.y = Math.random() * Math.PI;
                hillsContainer.add(mesh);
            }
            scene.add(hillsContainer);
        }

        function createReticle() {
            const ringGeo = new THREE.RingGeometry(0.8, 0.85, 32);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0x1d2d44, side: THREE.DoubleSide });
            reticleRing = new THREE.Mesh(ringGeo, ringMat);
            reticleRing.position.set(0, 0, -15); 
            playerContainer.add(reticleRing);

            const auraGeo = new THREE.RingGeometry(1.2, 1.3, 32);
            targetAura = new THREE.Mesh(auraGeo, new THREE.MeshBasicMaterial({ color: 0xff4757, side: THREE.DoubleSide }));
            targetAura.visible = false;
            scene.add(targetAura);
        }

        function spawnTargetAircraft() {
            if (!targetAircraft) {
                targetAircraft = new THREE.Group();

                const bodyGeo = new THREE.ConeGeometry(0.4, 3, 8);
                bodyGeo.rotateX(Math.PI / 2);
                const bodyMat = new THREE.MeshLambertMaterial({ color: 0xe63946 });
                const body = new THREE.Mesh(bodyGeo, bodyMat);
                targetAircraft.add(body);

                const wingGeo = new THREE.BoxGeometry(4, 0.1, 0.8);
                const wing = new THREE.Mesh(wingGeo, bodyMat);
                targetAircraft.add(wing);

                scene.add(targetAircraft);
            }

            // Hedefi her zaman tam karşı aksın ortasında daha yakın başlatıyoruz (Takip kolaylığı için -45 yerine -35)
            targetAircraft.position.set(
                playerContainer.position.x + (Math.random() - 0.5) * 3,
                playerContainer.position.y + (Math.random() - 0.5) * 2,
                playerContainer.position.z - 35
            );

            targetAircraft.userData = {
                timeOffset: Math.random() * 100,
                amplitudeX: 3 + Math.random() * 2, // Yapay zeka kaçış genişliklerini daralttık ki halkadan hemen kaçmasın
                amplitudeY: 1.5 + Math.random() * 1.5,
                speed: 0.6 + Math.random() * 0.3
            };

            targetAura.visible = false;
            isTargetInside = false;
            lockOnStartTime = null;
        }

        function animate() {
            if (!gameActive) return;
            requestAnimationFrame(animate);

            const clockTime = performance.now() * 0.001;

            let targetPitch = 0;
            let targetYaw = 0;

            // Jiroskop verisi varsa onu kullan, yoksa dokunmatik veriye geç
            if (isUsingTouch) {
                targetPitch = -touchPitch;
                targetYaw = -touchRoll;
            } else {
                targetPitch = -devicePitch * 0.6; 
                targetYaw = -deviceRoll * 0.7;   
            }

            // Sönümleme / Yumuşatma Hesabı
            currentRotation.x += (targetPitch - currentRotation.x) * SMOOTHING_FACTOR;
            currentRotation.y += (targetYaw - currentRotation.y) * SMOOTHING_FACTOR;
            
            playerContainer.quaternion.setFromEuler(currentRotation);

            // İleri İlerleme
            const forwardDirection = new THREE.Vector3(0, 0, -1).applyQuaternion(playerContainer.quaternion);
            playerContainer.position.addScaledVector(forwardDirection, FLIGHT_SPEED * 0.016);

            // Hedef Uçak Yapay Zekası
            const ai = targetAircraft.userData;
            const targetForward = new THREE.Vector3(0, 0, -1);
            targetAircraft.position.addScaledVector(targetForward, (FLIGHT_SPEED * 0.88) * 0.016);

            targetAircraft.position.x += Math.sin(clockTime * ai.speed + ai.timeOffset) * ai.amplitudeX * 0.016;
            targetAircraft.position.y += Math.cos(clockTime * ai.speed * 0.8 + ai.timeOffset) * ai.amplitudeY * 0.016;
            
            targetAircraft.lookAt(
                targetAircraft.position.x + Math.sin(clockTime * ai.speed + ai.timeOffset),
                targetAircraft.position.y,
                targetAircraft.position.z - 5
            );

            // Kilitlenme Kontrolü
            const reticleWorldPos = new THREE.Vector3();
            reticleRing.getWorldPosition(reticleWorldPos);
            const distanceToTargetLine = reticleWorldPos.distanceTo(targetAircraft.position);

            if (distanceToTargetLine < 5.0) { // Tolerans alanını kognitif odak kolaylığı için 4.5'ten 5.0'a çıkardık
                if (!isTargetInside) {
                    isTargetInside = true;
                    lockOnStartTime = performance.now();
                    targetAura.visible = true;
                }

                const elapsed = performance.now() - lockOnStartTime;
                const progress = Math.min(elapsed / LOCK_ON_TIME, 1);

                targetAura.material.color.setRGB(1 - progress * 0.72, 0.27 + progress * 0.5, 0.34 + progress * 0.08);
                
                targetAura.position.copy(targetAircraft.position);
                targetAura.lookAt(playerContainer.position);
                const scaleFactor = 1.3 - (progress * 0.4);
                targetAura.scale.set(scaleFactor, scaleFactor, scaleFactor);

                if (progress >= 1) {
                    score++;
                    document.querySelectorAll('.score').forEach(el => el.innerText = `Skor: ${score}`);
                    spawnTargetAircraft();
                }
            } else {
                isTargetInside = false;
                lockOnStartTime = null;
                targetAura.visible = false;
            }

            // Stereoscopic VR Render
            renderer.setViewport(0, 0, window.innerWidth / 2, window.innerHeight);
            renderer.setScissor(0, 0, window.innerWidth / 2, window.innerHeight);
            renderer.setScissorTest(true);
            renderer.render(scene, cameraLeft);

            renderer.setViewport(window.innerWidth / 2, 0, window.innerWidth / 2, window.innerHeight);
            renderer.setScissor(window.innerWidth / 2, 0, window.innerWidth / 2, window.innerHeight);
            renderer.setScissorTest(true);
            renderer.render(scene, cameraRight);
        }

        function onWindowResize() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            renderer.setSize(width, height);
            cameraLeft.aspect = (width / 2) / height;
            cameraLeft.updateProjectionMatrix();
            cameraRight.aspect = (width / 2) / height;
            cameraRight.updateProjectionMatrix();
        }
    </script>
</body>
</html>
