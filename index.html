<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Kognitif VR Uçuş Egzersizi</title>
    <style>
        /* Tam Ekran ve VR Düzeni Ayarları */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #a0c4ff; /* Açık mavi temiz gökyüzü arka planı */
            font-family: sans-serif;
            user-select: none;
        }

        /* Giriş ve Kalibrasyon Ekranı */
        #start-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(160, 196, 255, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: #1d2d44;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .btn {
            padding: 15px 40px;
            font-size: 20px;
            background: #3a86ff;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* VR Box Bölünmüş Ekran Göstergeleri (Sol ve Sağ Göz için Arayüz) */
        .ui-container {
            position: absolute;
            top: 5%;
            width: 50%;
            height: 15%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #1d2d44;
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
            z-index: 10;
            text-shadow: 1px 1px 3px rgba(255,255,255,0.8);
        }

        #ui-left { left: 0; }
        #ui-right { right: 0; }

        /* Ortadaki VR Bölme Çizgisi (Göz hizalamasını kolaylaştırmak için çok silik) */
        #vr-divider {
            position: absolute;
            left: 50%;
            top: 0;
            width: 1px;
            height: 100%;
            background: rgba(255, 255, 255, 0.15);
            z-index: 5;
        }

        #canvas3d {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="start-screen">
        <h2>Kognitif Odaklanma Egzersizi</h2>
        <p style="max-width: 400px; margin-bottom: 30px; line-height: 1.5;">
            Lütfen telefonu yatay konuma getirin. Başlamadan önce ekrana dokunup tam ekrana geçiş yapın ve ardından cihazı VR Box gözlüğünüze yerleştirin.
        </p>
        <button class="btn" id="start-btn">Egzersizi Başlat</button>
    </div>

    <div id="ui-left" class="ui-container">
        <div class="score">Skor: 0</div>
        <div class="timer" style="font-size: 16px; margin-top: 5px;">Süre: 120</div>
    </div>
    <div id="ui-right" class="ui-container">
        <div class="score">Skor: 0</div>
        <div class="timer" style="font-size: 16px; margin-top: 5px;">Süre: 120</div>
    </div>

    <div id="vr-divider"></div>
    <canvas id="canvas3d"></canvas>

    <script>
        // --- OYUN AYARLARI VE DEĞİŞKENLER ---
        const GAME_DURATION = 120; // 2 dakika (Saniye cinsinden)
        const LOCK_ON_TIME = 5000; // 5 saniye kilitlenme süresi (milisaniye)
        const FLIGHT_SPEED = 15;   // Sabit uçuş hızı (Kognitif kitle için yavaş süzülme)
        
        let score = 0;
        let timeLeft = GAME_DURATION;
        let gameActive = false;
        let wakeLock = null;

        // Kilitlenme (Lock-on) Takip Sistemleri
        let isTargetInside = false;
        let lockOnStartTime = null;

        // Jiroskop Oryantasyon Verileri
        let devicePitch = 0;
        let deviceRoll = 0;
        let basePitch = null;
        let baseRoll = null;

        // Yumuşatma (Damping) Katsayıları - Keskin hareketleri filtreler
        let currentRotation = new THREE.Euler(0, 0, 0, 'YXZ');
        const SMOOTHING_FACTOR = 0.03; // Ne kadar küçükse hareket o kadar sönümlü/yumuşak olur

        // Three.js Çekirdek Elemanları
        let renderer, scene, cameraLeft, cameraRight;
        let playerContainer, targetAircraft, reticleRing, targetAura;
        let hillsContainer;

        const canvas = document.getElementById('canvas3d');

        // --- BAŞLANGIÇ TETİKLEYİCİSİ (GÜNCEL VE DAHA ESNEK VERSİYON) ---
        document.getElementById('start-btn').addEventListener('click', async () => {
            // 1. Tam Ekran Modunu Aktif Etme
            try {
                if (document.documentElement.requestFullscreen) {
                    await document.documentElement.requestFullscreen();
                } else if (document.documentElement.webkitRequestFullscreen) {
                    await document.documentElement.webkitRequestFullscreen();
                }
            } catch (e) { console.log("Tam ekran başlatılamadı."); }

            // 2. Ekranın Kapanmesini Engelleme
            if ('wakeLock' in navigator) {
                try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
            }

            // 3. Sensör İzinleri ve Oyunu Her Koşulda Başlatma Güvencesi
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceOrientationEvent.requestPermission();
                    if (permissionState === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                    } else {
                        alert('Sensör izni verilmedi, ancak oyun simülasyon modunda başlıyor.');
                    }
                } catch (error) {
                    console.log("iOS izni atlandı veya hata oluştu.");
                }
            } else {
                // Android veya Masaüstü için doğrudan dinleyici ekle
                window.addEventListener('deviceorientation', handleOrientation);
            }

            // Ne olursa olsun oyunu başlat (Donmayı engellemek için)
            startGame();
        });

        function handleOrientation(event) {
            if (!event.alpha) return;

            // Yatay modda (Landscape) telefon kontrol eksenleri yer değiştirir
            // Beta: Pitch (Aşağı/Yukarı), Gamma: Roll (Sağ/Sol yatış)
            let rawPitch = event.beta * (Math.PI / 180);
            let rawRoll = event.gamma * (Math.PI / 180);

            // İlk açıyı referans (kalibrasyon) olarak kaydet
            if (basePitch === null) {
                basePitch = rawPitch;
                baseRoll = rawRoll;
            }

            // Referans açılardan ne kadar saptığımızı hesapla
            devicePitch = rawPitch - basePitch;
            deviceRoll = rawRoll - baseRoll;
        }

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            gameActive = true;
            initEngine();
            startTimer();
        }

        // --- SÜRE YÖNETİMİ ---
        function startTimer() {
            const timerInterval = setInterval(() => {
                if (!gameActive) {
                    clearInterval(timerInterval);
                    return;
                }
                timeLeft--;
                
                // UI Güncelleme
                document.querySelectorAll('.timer').forEach(el => el.innerText = `Süre: ${timeLeft}`);

                if (timeLeft <= 0) {
                    gameActive = false;
                    clearInterval(timerInterval);
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            // Ekranı yumuşakça karartıp final skorunu gösterme
            const endDiv = document.createElement('div');
            endDiv.style.position = 'absolute';
            endDiv.style.width = '100%';
            endDiv.style.height = '100%';
            endDiv.style.background = '#1d2d44';
            endDiv.style.color = 'white';
            endDiv.style.display = 'flex';
            endDiv.style.flexDirection = 'column';
            endDiv.style.justifyContent = 'center';
            endDiv.style.alignItems = 'center';
            endDiv.style.zIndex = '200';
            endDiv.style.fontSize = '32px';
            endDiv.innerHTML = `<h2>Egzersiz Tamamlandı</h2><p>Toplam Skor: ${score}</p>`;
            document.body.appendChild(endDiv);

            if (wakeLock) wakeLock.release();
        }

        // --- THREE.JS 3D SİSTEM KURUMLARI ---
        function initEngine() {
            const width = window.innerWidth;
            const height = window.innerHeight;

            // Renderer kurulumu
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(width, height);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            // Sahne oluşturma ve sis (derinlik hissi ve soft geçiş için)
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xa0c4ff);
            scene.fog = new THREE.FogExp2(0xa0c4ff, 0.005);

            // VR Çift Kamera Kurulumu (Stereoscopic Split Screen)
            // Sol ve Sağ göz kameraları aralarında hafif bir IPD (göz bebekleri arası mesafe) boşluğu ile konumlandırılır
            cameraLeft = new THREE.PerspectiveCamera(60, (width / 2) / height, 0.1, 1000);
            cameraRight = new THREE.PerspectiveCamera(60, (width / 2) / height, 0.1, 1000);
            
            cameraLeft.position.set(-0.3, 0, 0);
            cameraRight.position.set(0.3, 0, 0);

            // Oyuncu Konteyneri (Kameralar ve Reticle bu kutunun içinde ilerler)
            playerContainer = new THREE.Group();
            playerContainer.add(cameraLeft);
            playerContainer.add(cameraRight);
            scene.add(playerContainer);

            // Işıklandırma
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
            dirLight.position.set(5, 10, 7);
            scene.add(dirLight);

            createEnvironment();
            createReticle();
            spawnTargetAircraft();

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        // --- ÇEVRESEL TASARIM (PASTEL TEPELER) ---
        function createEnvironment() {
            hillsContainer = new THREE.Group();
            
            // Kullanıcıyı yormayacak, çok uzaklarda soft geometrik tepeler
            const hillGeo = new THREE.ConeGeometry(80, 40, 4); // Düşük poligonlu piramit/koni tepeler
            const hillMat = new THREE.MeshLambertMaterial({ color: 0xb7e4c7, flatShading: true });

            // Rastgele ama uzak konumlara tepeler serpiştirme (Ufuk çizgisi hissi için)
            for(let i = 0; i < 40; i++) {
                const mesh = new THREE.Mesh(hillGeo, hillMat);
                const angle = Math.random() * Math.PI * 2;
                const radius = 300 + Math.random() * 200; // Oyuncudan uzakta konumlandırma
                
                mesh.position.set(Math.cos(angle) * radius, -30, Math.sin(angle) * radius);
                mesh.rotation.y = Math.random() * Math.PI;
                hillsContainer.add(mesh);
            }
            scene.add(hillsContainer);
        }

        // --- HEDEF HALKASI (RETICLE) VE HALE (AURA) ---
        function createReticle() {
            // Oyuncunun 3D uzayda göz hizasının 15 birim önünde asılı duran halka
            const ringGeo = new THREE.RingGeometry(0.8, 0.85, 32);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0x1d2d44, side: THREE.DoubleSide });
            reticleRing = new THREE.Mesh(ringGeo, ringMat);
            reticleRing.position.set(0, 0, -15); 
            playerContainer.add(reticleRing); // Oyuncuyla beraber hareket eder

            // Düşmanın etrafında belirecek olan Kilitlenme Halesi (Aura)
            const auraGeo = new THREE.RingGeometry(1.2, 1.3, 32);
            // Başlangıç rengi pasif kırmızı/turuncu tonlarındadır
            targetAura = new THREE.Mesh(auraGeo, new THREE.MeshBasicMaterial({ color: 0xff4757, side: THREE.DoubleSide }));
            targetAura.visible = false;
            scene.add(targetAura);
        }

        // --- KAÇAN HEDEF UÇAK YAPAY ZEKASI ---
        function spawnTargetAircraft() {
            if (!targetAircraft) {
                // Basit, temiz geometrik formlardan bir 3D kaçış uçağı (Glider konsepti)
                targetAircraft = new THREE.Group();

                const bodyGeo = new THREE.ConeGeometry(0.4, 3, 8);
                bodyGeo.rotateX(Math.PI / 2);
                const bodyMat = new THREE.MeshLambertMaterial({ color: 0xe63946 }); // Dikkat çekici kontrast kırmızı renk
                const body = new THREE.Mesh(bodyGeo, bodyMat);
                targetAircraft.add(body);

                const wingGeo = new THREE.BoxGeometry(4, 0.1, 0.8);
                const wing = new THREE.Mesh(wingGeo, bodyMat);
                targetAircraft.add(wing);

                scene.add(targetAircraft);
            }

            // Yeni uçağı oyuncunun ilerlediği yönün hemen önünde yumuşak bir mesafede konumlandır
            targetAircraft.position.set(
                playerContainer.position.x + (Math.random() - 0.5) * 5,
                playerContainer.position.y + (Math.random() - 0.5) * 3,
                playerContainer.position.z - 45
            );

            // Yapay zeka kaçış rotası için özel sinüs/cos dalga verileri (Yumuşak salınım)
            targetAircraft.userData = {
                timeOffset: Math.random() * 100,
                amplitudeX: 4 + Math.random() * 3,
                amplitudeY: 2 + Math.random() * 2,
                speed: 0.8 + Math.random() * 0.4
            };

            targetAura.visible = false;
            isTargetInside = false;
            lockOnStartTime = null;
        }

        // --- ANA OYUN DÖNGÜSÜ (RENDER LOOP) ---
        function animate() {
            if (!gameActive) return;
            requestAnimationFrame(animate);

            const clockTime = performance.now() * 0.001;

            // 1. Jiroskop Verilerini Yumuşatarak (Damping) Dönüşe Aktarma
            // Ani sarsıntıları engelleyerek motion sickness riskini minimize eder
            let targetPitch = -devicePitch * 0.5; 
            let targetYaw = -deviceRoll * 0.6;   

            currentRotation.x += (targetPitch - currentRotation.x) * SMOOTHING_FACTOR;
            currentRotation.y += (targetYaw - currentRotation.y) * SMOOTHING_FACTOR;
            
            playerContainer.quaternion.setFromEuler(currentRotation);

            // 2. Sabit Hızda İleri Doğru Süzülme
            const forwardDirection = new THREE.Vector3(0, 0, -1).applyQuaternion(playerContainer.quaternion);
            playerContainer.position.addScaledVector(forwardDirection, FLIGHT_SPEED * 0.016);

            // 3. Kaçan Uçağın Yumuşak Yapay Zekası (Sinüs Eğrileri Modeli)
            const ai = targetAircraft.userData;
            const targetForward = new THREE.Vector3(0, 0, -1); // Düşman da ileri akar
            targetAircraft.position.addScaledVector(targetForward, (FLIGHT_SPEED * 0.9) * 0.016);

            // Sağa-sola ve yukarı-aşağı yapılan kavisli soft hareketler
            targetAircraft.position.x += Math.sin(clockTime * ai.speed + ai.timeOffset) * ai.amplitudeX * 0.016;
            targetAircraft.position.y += Math.cos(clockTime * ai.speed * 0.8 + ai.timeOffset) * ai.amplitudeY * 0.016;
            
            // Hedef uçağın yüzünü kaçış yönüne doğru yumuşakça çevirme
            targetAircraft.lookAt(
                targetAircraft.position.x + Math.sin(clockTime * ai.speed + ai.timeOffset),
                targetAircraft.position.y,
                targetAircraft.position.z - 5
            );

            // 4. Kilitlenme (Lock-on) Mekaniği Algoritması
            // Düşman uçağın ekranın (halkanın) merkezine olan izdüşüm mesafesini ölçme
            const reticleWorldPos = new THREE.Vector3();
            reticleRing.getWorldPosition(reticleWorldPos);

            const distanceToTargetLine = reticleWorldPos.distanceTo(targetAircraft.position);

            // Eğer hedef uçak 3D uzaydaki halkamızın etki alanına (tolerans sınırı) girdiyse
            if (distanceToTargetLine < 4.5) { 
                if (!isTargetInside) {
                    isTargetInside = true;
                    lockOnStartTime = performance.now();
                    targetAura.visible = true;
                }

                // Kaç saniyedir halkanın içinde tutulduğunu hesaplama
                const elapsed = performance.now() - lockOnStartTime;
                const progress = Math.min(elapsed / LOCK_ON_TIME, 1);

                // Geri Bildirim: Hale rengini kademeli olarak yeşile döndürme
                // RGB Geçişi: Kırmızıdan (1, 0.27, 0.34) -> Yeşile (0.28, 0.7a, 0.42)
                targetAura.material.color.setRGB(1 - progress * 0.72, 0.27 + progress * 0.5, 0.34 + progress * 0.08);
                
                // Haleyi düşman uçağın konumuna eşitleme ve uçağa doğru daraltma (görsel indikatör)
                targetAura.position.copy(targetAircraft.position);
                targetAura.lookAt(playerContainer.position);
                const scaleFactor = 1.3 - (progress * 0.4);
                targetAura.scale.set(scaleFactor, scaleFactor, scaleFactor);

                // 5 Saniye Kesintisiz Odaklanma Başarıldıysa
                if (progress >= 1) {
                    score++;
                    document.querySelectorAll('.score').forEach(el => el.innerText = `Skor: ${score}`);
                    spawnTargetAircraft(); // Mevcut uçağı patlat ve yeni hedefe geç
                }
            } else {
                // Hedef halkadan çıktıysa takip durumunu sıfırla
                isTargetInside = false;
                lockOnStartTime = null;
                targetAura.visible = false;
            }

            // 5. ÇİFT KAMERA VR RENDER (Stereoscopic Rendering)
            // Ekran sol yarıya bölünür, sol kamera çizilir
            renderer.setViewport(0, 0, window.innerWidth / 2, window.innerHeight);
            renderer.setScissor(0, 0, window.innerWidth / 2, window.innerHeight);
            renderer.setScissorTest(true);
            renderer.render(scene, cameraLeft);

            // Ekran sağ yarıya bölünür, sağ kamera çizilir
            renderer.setViewport(window.innerWidth / 2, 0, window.innerWidth / 2, window.innerHeight);
            renderer.setScissor(window.innerWidth / 2, 0, window.innerWidth / 2, window.innerHeight);
            renderer.setScissorTest(true);
            renderer.render(scene, cameraRight);
        }

        // Ekran boyutları değiştiğinde veya yön döndüğünde uyumluluk sağlama
        function onWindowResize() {
            const width = window.innerWidth;
            const height = window.innerHeight;

            renderer.setSize(width, height);
            
            cameraLeft.aspect = (width / 2) / height;
            cameraLeft.updateProjectionMatrix();

            cameraRight.aspect = (width / 2) / height;
            cameraRight.updateProjectionMatrix();
        }
    </script>
</body>
</html>
