<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Kognitif VR Uçuş Egzersizi</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #a0c4ff;
            font-family: sans-serif;
            user-select: none;
        }

        #start-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(160, 196, 255, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: #1d2d44;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .btn {
            padding: 15px 40px;
            font-size: 20px;
            background: #3a86ff;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .ui-container {
            position: absolute;
            top: 5%;
            width: 50%;
            height: 15%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #1d2d44;
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
            z-index: 10;
            text-shadow: 1px 1px 3px rgba(255,255,255,0.8);
        }

        #ui-left { left: 0; }
        #ui-right { right: 0; }

        #vr-divider {
            position: absolute;
            left: 50%;
            top: 0;
            width: 1px;
            height: 100%;
            background: rgba(255, 255, 255, 0.15);
            z-index: 5;
        }

        #canvas3d {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="start-screen">
        <h2>Kognitif Odaklanma Egzersizi</h2>
        <p style="max-width: 400px; margin-bottom: 30px; line-height: 1.5;">
            Lütfen telefonu yatay konuma getirin. Başlamadan önce ekrana dokunup tam ekrana geçiş yapın ve ardından cihazı VR Box gözlüğünüze yerleştirin.
        </p>
        <button class="btn" id="start-btn">Egzersizi Başlat</button>
    </div>

    <div id="ui-left" class="ui-container">
        <div class="score">Skor: 0</div>
        <div class="timer" style="font-size: 16px; margin-top: 5px;">Süre: 120</div>
    </div>
    <div id="ui-right" class="ui-container">
        <div class="score">Skor: 0</div>
        <div class="timer" style="font-size: 16px; margin-top: 5px;">Süre: 120</div>
    </div>

    <div id="vr-divider"></div>
    <canvas id="canvas3d"></canvas>

    <script>
        // --- OYUN AYARLARI VE DEĞİŞKENLER ---
        const GAME_DURATION = 120; 
        const LOCK_ON_TIME = 5000; 
        const FLIGHT_SPEED = 15;   
        
        let score = 0;
        let timeLeft = GAME_DURATION;
        let gameActive = false;
        let wakeLock = null;
        
        // Pürüzsüz akış ve simüle edilmiş zaman takibi değişkenleri
        let clock = new THREE.Clock(); 
        let simulatedTime = 0; 

        let isTargetInside = false;
        let lockOnStartTime = null;

        // Jiroskop Ham ve Filtrelenmiş Verileri
        let rawPitch = 0;
        let rawRoll = 0;
        let filteredPitch = 0;
        let filteredRoll = 0;
        let basePitch = null;
        let baseRoll = null;
        
        // Low-pass filtre katsayısı (0.15 = %15 yeni veri, %85 eski veri koruması ile yüksek pürüzsüzlük)
        const GYRO_FILTER_FACTOR = 0.15; 

        // Yedek Kontrol Verileri
        let touchStartX = 0;
        let touchStartY = 0;
        let touchPitch = 0;
        let touchRoll = 0;
        let isUsingTouch = true; 

        let currentRotation = new THREE.Euler(0, 0, 0, 'YXZ');
        const SMOOTHING_FACTOR = 0.04; 

        let renderer, scene, cameraLeft, cameraRight;
        let playerContainer, targetAircraft, reticleRing, targetAura;
        let hillsContainer;

        const canvas = document.getElementById('canvas3d');

        // --- BUTON VE SENSÖR BAĞLANTILARI ---
        document.getElementById('start-btn').addEventListener('click', function() {
            try {
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen();
                } else if (document.documentElement.webkitRequestFullscreen) {
                    document.documentElement.webkitRequestFullscreen();
                }
            } catch (e) {}

            if ('wakeLock' in navigator) {
                navigator.wakeLock.request('screen').then(lock => { wakeLock = lock; }).catch(()=>{});
            }

            setupTouchControls();

            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation, true);
                        }
                    })
                    .catch(err => {
                        window.addEventListener('deviceorientation', handleOrientation, true);
                    });
            } else {
                window.addEventListener('deviceorientation', handleOrientation, true);
            }

            startGame();
        });

        // --- SENSÖR VERİSİ ALMA VE FILTRE ÖNCESİ HAZIRLIK ---
        function handleOrientation(event) {
            if (event.beta === null || event.gamma === null) return;
            isUsingTouch = false;

            const orientation = window.orientation || window.screen.orientation?.angle || 0;

            if (orientation === 90 || orientation === -90) {
                rawPitch = (orientation === 90 ? event.gamma : -event.gamma) * (Math.PI / 180);
                rawRoll = (orientation === 90 ? -event.beta : event.beta) * (Math.PI / 180);
            } else {
                rawPitch = -event.beta * (Math.PI / 180);
                rawRoll = event.gamma * (Math.PI / 180);
            }

            if (basePitch === null) {
                basePitch = rawPitch;
                baseRoll = rawRoll;
            }
        }

        function setupTouchControls() {
            window.addEventListener('touchstart', (e) => {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            });

            window.addEventListener('touchmove', (e) => {
                if (!isUsingTouch) return;
                const deltaX = e.touches[0].clientX - touchStartX;
                const deltaY = e.touches[0].clientY - touchStartY;

                touchRoll -= (deltaX * 0.005);
                touchPitch -= (deltaY * 0.005);

                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            });

            let isDragging = false;
            window.addEventListener('mousedown', (e) => {
                isDragging = true;
                touchStartX = e.clientX;
                touchStartY = e.clientY;
            });

            window.addEventListener('mousemove', (e) => {
                if (!isDragging || !isUsingTouch) return;
                const deltaX = e.clientX - touchStartX;
                const deltaY = e.clientY - touchStartY;

                touchRoll -= (deltaX * 0.003);
                touchPitch -= (deltaY * 0.003);

                touchStartX = e.clientX;
                touchStartY = e.clientY;
            });

            window.addEventListener('mouseup', () => { isDragging = false; });
        }

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            gameActive = true;
            clock.start(); 
            initEngine();
            startTimer();
        }

        function startTimer() {
            const timerInterval = setInterval(() => {
                if (!gameActive) {
                    clearInterval(timerInterval);
                    return;
                }
                timeLeft--;
                document.querySelectorAll('.timer').forEach(el => el.innerText = `Süre: ${timeLeft}`);

                if (timeLeft <= 0) {
                    gameActive = false;
                    clearInterval(timerInterval);
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            const endDiv = document.createElement('div');
            endDiv.style.position = 'absolute';
            endDiv.style.width = '100%';
            endDiv.style.height = '100%';
            endDiv.style.background = '#1d2d44';
            endDiv.style.color = 'white';
            endDiv.style.display = 'flex';
            endDiv.style.flexDirection = 'column';
            endDiv.style.justifyContent = 'center';
            endDiv.style.alignItems = 'center';
            endDiv.style.zIndex = '200';
            endDiv.style.fontSize = '32px';
            endDiv.innerHTML = `<h2>Egzersiz Tamamlandı</h2><p>Toplam Skor: ${score}</p>`;
            document.body.appendChild(endDiv);

            if (wakeLock) wakeLock.release();
        }

        function initEngine() {
            const width = window.innerWidth;
            const height = window.innerHeight;

            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(width, height);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xa0c4ff);
            scene.fog = new THREE.FogExp2(0xa0c4ff, 0.005);

            cameraLeft = new THREE.PerspectiveCamera(60, (width / 2) / height, 0.1, 1000);
            cameraRight = new THREE.PerspectiveCamera(60, (width / 2) / height, 0.1, 1000);
            
            cameraLeft.position.set(-0.3, 0, 0);
            cameraRight.position.set(0.3, 0, 0);

            playerContainer = new THREE.Group();
            playerContainer.add(cameraLeft);
            playerContainer.add(cameraRight);
            scene.add(playerContainer);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
            dirLight.position.set(5, 10, 7);
            scene.add(dirLight);

            createEnvironment();
            createReticle();
            spawnTargetAircraft();

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function createEnvironment() {
            hillsContainer = new THREE.Group();
            const hillGeo = new THREE.ConeGeometry(80, 40, 4);
            const hillMat = new THREE.MeshLambertMaterial({ color: 0xb7e4c7, flatShading: true });

            for(let i = 0; i < 40; i++) {
                const mesh = new THREE.Mesh(hillGeo, hillMat);
                const angle = Math.random() * Math.PI * 2;
                const radius = 300 + Math.random() * 200;
                mesh.position.set(Math.cos(angle) * radius, -30, Math.sin(angle) * radius);
                mesh.rotation.y = Math.random() * Math.PI;
                hillsContainer.add(mesh);
            }
            scene.add(hillsContainer);
        }

        function createReticle() {
            const ringGeo = new THREE.RingGeometry(1.2, 1.275, 32);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0x1d2d44, side: THREE.DoubleSide });
            reticleRing = new THREE.Mesh(ringGeo, ringMat);
            reticleRing.position.set(0, 0, -15); 
            playerContainer.add(reticleRing);

            const auraGeo = new THREE.RingGeometry(1.5, 1.62, 32);
            targetAura = new THREE.Mesh(auraGeo, new THREE.MeshBasicMaterial({ color: 0xff4757, side: THREE.DoubleSide }));
            targetAura.visible = false;
            scene.add(targetAura);
        }

        function spawnTargetAircraft() {
            if (!targetAircraft) {
                targetAircraft = new THREE.Group();
                const bodyGeo = new THREE.ConeGeometry(0.4, 3, 8);
                bodyGeo.rotateX(Math.PI / 2);
                const bodyMat = new THREE.MeshLambertMaterial({ color: 0xe63946 });
                const body = new THREE.Mesh(bodyGeo, bodyMat);
                targetAircraft.add(body);

                const wingGeo = new THREE.BoxGeometry(4, 0.1, 0.8);
                const wing = new THREE.Mesh(wingGeo, bodyMat);
                targetAircraft.add(wing);

                scene.add(targetAircraft);
            }

            targetAircraft.position.set(
                playerContainer.position.x + (Math.random() - 0.5) * 4,
                playerContainer.position.y + (Math.random() - 0.5) * 3,
                playerContainer.position.z - 55
            );

            targetAircraft.userData = {
                timeOffset: Math.random() * 100,
                amplitudeX: 5.8 + Math.random() * 3,  
                amplitudeY: 3.2 + Math.random() * 2,  
                speed: 0.65 + Math.random() * 0.3
            };

            targetAura.visible = false;
            isTargetInside = false;
            lockOnStartTime = null;
        }

        function animate() {
            if (!gameActive) return;
            requestAnimationFrame(animate);

            // 1. ADIM: Donanımsal Ekran Hızından Soyutlama (Delta Zaman Sabitleme)
            const delta = Math.min(clock.getDelta(), 0.1);
            // Sinüs dalgalarının anlık sıçramasını engellemek için zamanı sabit adımlarla biriktiriyoruz
            simulatedTime += delta; 

            let targetPitch = 0;
            let targetYaw = 0;

            if (isUsingTouch) {
                targetPitch = touchPitch;
                targetYaw = touchRoll;
            } else {
                // 2. ADIM: Low-Pass Filter (Alçak Geçiren Filtre) Entegrasyonu
                // Gelen ham jiroskop verisindeki gürültüleri filtreleyerek sönümlüyoruz
                let currentRawPitch = rawPitch - (basePitch || 0);
                let currentRawRoll = rawRoll - (baseRoll || 0);

                filteredPitch = filteredPitch + GYRO_FILTER_FACTOR * (currentRawPitch - filteredPitch);
                filteredRoll = filteredRoll + GYRO_FILTER_FACTOR * (currentRawRoll - filteredRoll);

                targetPitch = filteredPitch * 0.6; 
                targetYaw = filteredRoll * 0.7;   
            }

            // Çift kademeli yumuşatma ile pürüzsüz rotasyon
            currentRotation.x += (targetPitch - currentRotation.x) * SMOOTHING_FACTOR;
            currentRotation.y += (targetYaw - currentRotation.y) * SMOOTHING_FACTOR;
            
            playerContainer.quaternion.setFromEuler(currentRotation);

            const forwardDirection = new THREE.Vector3(0, 0, -1).applyQuaternion(playerContainer.quaternion);
            playerContainer.position.addScaledVector(forwardDirection, FLIGHT_SPEED * delta);

            const ai = targetAircraft.userData;
            const targetForward = new THREE.Vector3(0, 0, -1);
            targetAircraft.position.addScaledVector(targetForward, (FLIGHT_SPEED * 0.88) * delta);

            // 3. ADIM: Sıçramayan Matematiksel Pozisyon Güncellemesi
            // performace.now() yerine tamamen pürüzsüz simüle zamanı (simulatedTime) kullanıyoruz
            targetAircraft.position.x += Math.cos(simulatedTime * ai.speed + ai.timeOffset) * ai.amplitudeX * delta;
            targetAircraft.position.y += Math.sin(simulatedTime * ai.speed * 0.8 + ai.timeOffset) * ai.amplitudeY * delta;
            
            targetAircraft.lookAt(
                targetAircraft.position.x + Math.sin(simulatedTime * ai.speed + ai.timeOffset),
                targetAircraft.position.y,
                targetAircraft.position.z - 5
            );

            // Derinlikten Bağımsız Hizalama Kontrolü
            const cameraDirection = new THREE.Vector3(0, 0, -1).applyQuaternion(playerContainer.quaternion);
            const toTargetVector = new THREE.Vector3().subVectors(targetAircraft.position, playerContainer.position).normalize();
            const angleDifference = cameraDirection.angleTo(toTargetVector);

            if (angleDifference < 0.14) { 
                if (!isTargetInside) {
                    isTargetInside = true;
                    lockOnStartTime = performance.now();
                    targetAura.visible = true;
                }

                const elapsed = performance.now() - lockOnStartTime;
                const progress = Math.min(elapsed / LOCK_ON_TIME, 1);

                targetAura.material.color.setRGB(1 - progress * 0.72, 0.27 + progress * 0.5, 0.34 + progress * 0.08);
                
                targetAura.position.copy(targetAircraft.position);
                targetAura.lookAt(playerContainer.position);
                
                const distanceToShip = playerContainer.position.distanceTo(targetAircraft.position);
                const baseScale = (distanceToShip * 0.04) * (1.3 - (progress * 0.4));
                targetAura.scale.set(baseScale, baseScale, baseScale);

                if (progress >= 1) {
                    score++;
                    document.querySelectorAll('.score').forEach(el => el.innerText = `Skor: ${score}`);
                    spawnTargetAircraft();
                }
            } else {
                isTargetInside = false;
                lockOnStartTime = null;
                targetAura.visible = false;
            }

            // Stereoscopic VR Render
            renderer.setViewport(0, 0, window.innerWidth / 2, window.innerHeight);
            renderer.setScissor(0, 0, window.innerWidth / 2, window.innerHeight);
            renderer.setScissorTest(true);
            renderer.render(scene, cameraLeft);

            renderer.setViewport(window.innerWidth / 2, 0, window.innerWidth / 2, window.innerHeight);
            renderer.setScissor(window.innerWidth / 2, 0, window.innerWidth / 2, window.innerHeight);
            renderer.setScissorTest(true);
            renderer.render(scene, cameraRight);
        }

        function onWindowResize() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            renderer.setSize(width, height);
            cameraLeft.aspect = (width / 2) / height;
            cameraLeft.updateProjectionMatrix();
            cameraRight.aspect = (width / 2) / height;
            cameraRight.updateProjectionMatrix();
        }
    </script>
</body>
</html>
